############################################################################
#[default]

ao=alsa
volume=90

alang=eng,en,spa
slang=eng,en,spa

#  --softvol=<mode>
#	Control whether to use the volume controls of the audio output driver or the internal mpv volume filter.
#	yes, no, auto
softvol=yes

#  --stretch-dvd-subs=<yes|no>
#	Stretch DVD subtitles when playing anamorphic videos for better looking fonts on badly mastered DVDs. This switch has no effect when the video is stored with square pixels - which for DVD input cannot be the case though.
stretch-dvd-subs=yes

#  --cursor-autohide=<number|no|always>
#	Make mouse cursor automatically hide after given number of milliseconds. no will disable cursor autohide. always means the cursor will stay hidden.
cursor-autohide=3000

osd-level=1
osd-border-size=3
osd-color='#DDEEFF'
#  --osd-fractions
#	Show OSD times with fractions of seconds (in millisecond precision). Useful to see the exact timestamp of a video frame.
osd-fractions=no

screenshot-format=jpg
screenshot-jpeg-quality=80

force-window=yes


######################################################
[FASTDECODING]
######################################################

# --framedrop=[no,vo,decoder] vo=normal decoder=heavy
framedrop=vo

#  --vd-lavc-skiploopfilter=<skipvalue> (H.264 only)
#	Skips the loop filter (AKA deblocking) during H.264 decoding. Since the filtered frame is supposed to be used as reference for decoding dependent frames, this has a worse effect on quality than not doing deblocking on e.g. MPEG-2 video. But at least for high bitrate HDTV, this provides a big speedup with little visible quality loss.
#	<skipvalue> can be one of the following:
#		none, default, nonref, bidir, nonkey, all
vd-lavc-skiploopfilter=all

#  --vd-lavc-skipframe=<skipvalue>
#	Skips decoding of frames completely. Big speedup, but jerky motion and sometimes bad artifacts (see skiploopfilter for available skip values).
vd-lavc-skipframe=none

#  --vd-lavc-framedrop=<skipvalue>
#	Set framedropping mode used with --framedrop (see skiploopfilter for available skip values).
vd-lavc-framedrop=default

#  --vd-lavc-skipidct=<skipvalue> (MPEG-1/2 only)
#	Skips the IDCT step. This degrades quality a lot in almost all cases (see skiploopfilter for available skip values).
vd-lavc-skipidct=none

#  --audio-pitch-correction=<yes|no>
audio-pitch-correction=no

#  --embeddedfonts, --no-embeddedfonts
#	Use fonts embedded in Matroska container files and ASS scripts (default: enabled). These fonts can be used for SSA/ASS subtitle rendering.
embeddedfonts=no
#############################################

[EXTREMEFASTDECODING]
######################################################

# --framedrop=[no,vo,decoder] vo=normal decoder=heavy
framedrop=vo

#  --vd-lavc-skiploopfilter=<skipvalue> (H.264 only)
#	Skips the loop filter (AKA deblocking) during H.264 decoding. Since the filtered frame is supposed to be used as reference for decoding dependent frames, this has a worse effect on quality than not doing deblocking on e.g. MPEG-2 video. But at least for high bitrate HDTV, this provides a big speedup with little visible quality loss.
#	<skipvalue> can be one of the following:
#		none, default, nonref, bidir, nonkey, all
vd-lavc-skiploopfilter=all

#  --vd-lavc-skipframe=<skipvalue>
vd-lavc-skipframe=nonref
#	Skips decoding of frames completely. Big speedup, but jerky motion and sometimes bad artifacts (see skiploopfilter for available skip values).

#  --vd-lavc-framedrop=<skipvalue>
#	Set framedropping mode used with --framedrop (see skiploopfilter for available skip values).
vd-lavc-framedrop=all

#  --vd-lavc-skipidct=<skipvalue> (MPEG-1/2 only)
#	Skips the IDCT step. This degrades quality a lot in almost all cases (see skiploopfilter for available skip values).
vd-lavc-skipidct=none

#  --audio-pitch-correction=<yes|no>
audio-pitch-correction=no

#  --embeddedfonts, --no-embeddedfonts
#	Use fonts embedded in Matroska container files and ASS scripts (default: enabled). These fonts can be used for SSA/ASS subtitle rendering.
embeddedfonts=no
######################################################



############################################################################
#
#
# mpv configuration file
#
# Configuration files are read system-wide from /usr/local/etc/mpv.conf
# and per-user from ~/.config/mpv/mpv.conf, where per-user settings override
# system-wide settings, all of which are overridden by the command line.
#
# Configuration file settings and the command line options use the same
# underlying mechanisms. Most options can be put into the configuration file
# by dropping the preceding '--'. See the man page for a complete list of
# options.
#
# Lines starting with '#' are comments and are ignored.
#
# See the CONFIGURATION FILES section in the man page
# for a detailed description of the syntax.
#
# Profiles should be placed at the bottom of the configuration file to ensure
# that settings wanted as defaults are not restricted to specific profiles.
#
# Note that the commented example options usually do _not_ set the default
# values. Calling mpv with --list-options is a nice way to see the default
# values for most options.

##################
# video settings #
##################

# Specify default video driver (see --vo=help for a list).
#vo=vdpau

# Start in fullscreen mode by default.
#fs=yes

# force starting with centered window
#geometry=50%:50%

# don't allow a new window to have a size larger than 90% of the screen size
#autofit-larger=90%x90%

# Disable the On Screen Controller (OSC).
#osc=no

# Keep the player window on top of all other windows.
#ontop=yes

##################
# audio settings #
##################

# Specify default audio driver (see --ao=help for a list).
#ao=alsa

# Disable softvol usage, and always use the system mixer if available.
#softvol=no

# Scale audio tempo by playback speed without altering pitch. (By default does
# nothing if playback speed is not changed. May introduce artifacts.)
#af=scaletempo

# Output 5.1 audio natively, and upmix/downmix audio with a different format.
#audio-channels=5.1
# Disable any automatic remix, _if_ the audio output accepts the audio format.
# of the currently played file. See caveats mentioned in the manpage.
# (This is the default.)
#audio-channels=auto

##################
# other settings #
##################

# Pretend to be a web browser. Might fix playback with some streaming sites,
# but also will break with shoutcast streams.
#user-agent="Mozilla/5.0"

# cache settings
#
# Use 8MB input cache by default. The cache is enabled for network streams only.
#cache-default=8192
#
# Use 8MB input cache for everything, even local files.
#cache=8192
#
# If a seek is issued, and the target is 1024KB past the cached range, then
# keep reading until the seek target is hit, instead of doing a real seek.
#cache-seek-min=1024
#
# Disable the behavior that the player will pause if the cache goes below a
# certain fill size.
#cache-pause=no
#
# Read ahead about 5 seconds of audio and video packets.
#demuxer-readahead-secs=5.0

# Display English subtitles if available.
#slang=en

# Play Finnish audio if available, fall back to English otherwise.
#alang=fi,en

# Change subtitle encoding. For Arabic subtitles use 'cp1256'.
# If the file seems to be valid UTF-8, prefer UTF-8.
#sub-codepage=utf8:cp1256

# Enable hardware decoding if available. Often, this requires using an certain
# video output, otherwise no hardware decoding will be used.
#hwdec=auto

############
# Profiles #
############

# The options declared as part of profiles override global default settings,
# but only take effect when the profile is active.

# The following profile can be enabled on the command line with: --profile=vdpau

#[vdpau]
# The profile forces the vdpau VO.
#vo=vdpau
# Use hardware decoding (this might break playback of some h264 files)
#hwdec=vdpau
# Most video filters do not work with hardware decoding.
#vf-clr=yes

# You can also include other configuration files.
#include=/path/to/the/file/you/want/to/include
